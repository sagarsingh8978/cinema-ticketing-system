name: Helm - Build and Deploy API Gateway

on:
  push:
    branches: [ develop ]
    paths:
      - 'api-gateway/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile
          push: true
          # 🌟 Uses the commit SHA as the tag so Helm detects changes natively
          tags: |
            ghcr.io/sagarsingh8978/api-gateway:latest
            ghcr.io/sagarsingh8978/api-gateway:${{ github.sha }}
          no-cache: true

  deploy-to-local-k8s:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy API Gateway via Helm
        run: |
          # 🌟 Upgrades ONLY the api-gateway container tag, reusing all other existing application states
          helm upgrade --install cinema-ticketing-release ./charts/cinema-apps \
            -n cinema-ticketing \
            --reuse-values \
            --set services.api-gateway.tag=${{ github.sha }}