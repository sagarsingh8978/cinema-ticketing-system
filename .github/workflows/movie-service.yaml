name: Movie-Service-Workflow

on:
  push:
    branches: [ main ]
    paths:
      - 'movie-service/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./movie-service
          file: ./movie-service/Dockerfile
          push: true
          tags: ghcr.io/sagarsingh8978/movie-service:latest
          no-cache: true # 🌟 FORCES DOCKER TO BUILD FRESH LAYER BY LAYER

  deploy-to-local-k8s:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Clean Local Image Cache and Restart Pods
        run: |
          # 🌟 FIXED: Uses PowerShell try/catch block to safely ignore errors on Windows
          try { docker rmi ghcr.io/sagarsingh8978/movie-service:latest --force } catch {}
          kubectl apply -f k8s/apps-deployment.yaml -n cinema-ticketing
          kubectl rollout restart deployment/movie-service-deployment -n cinema-ticketing