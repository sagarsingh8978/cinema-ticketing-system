name: Helm - Build and Deploy Movie Service

on:
  push:
    branches: [ develop ]
    paths:
      - 'movie-service/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./movie-service
          file: ./movie-service/Dockerfile
          push: true
          tags: |
            ghcr.io/sagarsingh8978/movie-service:latest
            ghcr.io/sagarsingh8978/movie-service:${{ github.sha }}
          no-cache: true

  deploy-to-local-k8s:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Movie Service via Helm
        run: |
            & "C:\Users\Sagar Singh\AppData\Local\Microsoft\WinGet\Links\helm.exe" upgrade --install cinema-ticketing-release ./charts/cinema-apps `
              -n cinema-ticketing `
              --reuse-values `
              --set services.movie-service.tag=${{ github.sha }}