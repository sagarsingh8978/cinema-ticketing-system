name: Movie-Service-Workflow

on:
  push:
    branches: [ main ]
    paths:
      - 'movie-service/**' # 🌟 Triggers only on User Service changes

# 🌟 ADDED: Grants permissions to write packages using GITHUB_TOKEN
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # 🌟 CHANGED: Securely logs in using GITHUB_TOKEN
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          file: ./user-service/Dockerfile
          push: true
          tags: ghcr.io/sagarsingh8978/movie-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-local-k8s:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Apply Kubernetes Manifests and Restart Pods
        run: |
          kubectl apply -f k8s/apps-deployment.yaml
          kubectl rollout restart deployment/movie-service-deployment -n cinema-ticketing