name: Helm- Build and Deploy User Service

on:
  push:
    branches: [ develop ]
    paths:
      - 'user-service/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          file: ./user-service/Dockerfile
          push: true
          tags: |
            ghcr.io/sagarsingh8978/user-service:latest
            ghcr.io/sagarsingh8978/user-service:${{ github.sha }}
          no-cache: true

  deploy-to-local-k8s:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy User Service via Helm
        run: |
          # Upgrades ONLY the user-service container tag, preserving everything else
          helm upgrade --install cinema-ticketing-release ./charts/cinema-apps `
            -n cinema-ticketing `
            --reuse-values `
            --set services.user-service.tag=${{ github.sha }}