apiVersion: v1
kind: ConfigMap
metadata:
  name: database-credentials
  namespace: cinema-ticketing #
data:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "SystemPassword123!"
---
# === USER SERVICE DATABASE ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-user-db
  namespace: cinema-ticketing #
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-user
  template:
    metadata:
      labels:
        app: postgres-user
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "user_db"
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: database-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: database-credentials
              key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-user-service
  namespace: cinema-ticketing #
spec:
  ports:
  - port: 5432
  selector:
    app: postgres-user
---
