apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway-container
          image: ghcr.io/sagarsingh8978/api-gateway:latest
          imagePullPolicy: Always           # Forces K8s to pull fresh image from GHCR
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: api-gateway
---
# ========================================================
# USER SERVICE (WITH PROD PROFILE ACTIVATED)
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service-container
          image: ghcr.io/sagarsingh8978/user-service:latest
          imagePullPolicy: Always             # Forces K8s to pull fresh image from GHCR
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"                     # Activates application-prod.yaml natively!
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: application-config
                  key: USER_DB_URL
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: database-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: database-credentials
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: user-service
---
